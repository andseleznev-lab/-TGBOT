    <link rel="stylesheet" href="styles.css?v=72">
    
    <!-- 🔧 СТИЛИ ДЛЯ КНОПОК ОТЛАДКИ -->

        #debug-controls {
            position: fixed;

            right: 10px;
            z-index: 9999;
            display: flex;
            gap: 8px;
        }

        .debug-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            transition: all 0.2s;
        }

        .debug-btn:active {
            transform: scale(0.95);
        }

        .debug-btn.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .debug-btn.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
    </style>
</head>
<body>
    <!-- [T-008] Модалка согласия на политику конфиденциальности -->
    <!-- ВАЖНО: Размещена в начале body для iOS Safari position:fixed fix -->
    <div id="consent-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="consent-modal glass-card">
            <h2>Добро пожаловать!</h2>
            <p class="consent-text">Чтобы продолжить, ознакомьтесь с документами</p>
            <div class="consent-links">
                <a href="https://arinaprovodnik.com/politica" target="_blank" class="consent-link">
                    Политика конфиденциальности
                </a>
                <a href="https://arinaprovodnik.com/person" target="_blank" class="consent-link">
                    Согласие на обработку ПД
                </a>
            </div>
            <button id="consent-agree-btn" class="consent-btn">Ознакомился</button>
        </div>
    </div>

    <!-- 🔧 КНОПКИ ОТЛАДКИ -->
    <div id="debug-controls">
        <button class="debug-btn" onclick="downloadLogs()">📥 Скачать логи</button>
        <button class="debug-btn" onclick="copyLogs()">📋 Копировать</button>
        <button class="debug-btn" onclick="clearLogs()">🗑️ Очистить</button>
    </div>

    <!-- Основной контейнер приложения -->
    <div id="app">
        <div class="loader-container">

    </div>

    <!-- Кастомный попап успеха -->
    <div id="success-popup-overlay" class="success-popup-overlay hidden">
        <div class="success-popup">
            <div class="success-popup-header">
                <h2 id="success-popup-title">Готово</h2>
            </div>
            <div class="success-popup-body">
                <p id="success-popup-message">Запись отменена</p>
            </div>
            <div class="success-popup-footer">
                <button class="success-popup-button" onclick="hideSuccessPopup()">ОК</button>
            </div>
        </div>
    </div>

    <!-- Кастомный попап ошибки (слот занят) -->
    <div id="error-popup-overlay" class="error-popup-overlay hidden">
        <div class="error-popup">
            <div class="error-popup-header">
                <h2 id="error-popup-title">Упс!</h2>
            </div>
            <div class="error-popup-body">
                <p id="error-popup-message">Слот уже забронирован</p>
            </div>
            <div class="error-popup-footer">
                <button class="error-popup-button" onclick="hideSlotTakenPopup()">Понятно</button>
            </div>
        </div>
    </div>

    <!-- Навигация (Tab Bar) -->
    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="services">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Услуги</span>
        </button>
        <button class="tab-btn" data-tab="club">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M2 21v-4a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v4"></path>
                <circle cx="18" cy="9" r="3"></circle>
                <path d="M23 21v-3a3 3 0 0 0-3-3h-1"></path>
            </svg>
            <span>Клуб</span>
        </button>
        <button class="tab-btn" data-tab="booking">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Запись</span>
        </button>
        <button class="tab-btn" data-tab="mybookings">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"></path>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
            <span>Мои записи</span>
        </button>
    </nav>

    <!-- 🔧 СИСТЕМА ЛОГИРОВАНИЯ -->
    <script>
        // Массив для хранения всех логов
        window.appLogs = [];
        
        // Функция форматирования времени
        function formatTime(date) {
            const h = String(date.getHours()).padStart(2, '0');
            const m = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            const ms = String(date.getMilliseconds()).padStart(3, '0');
            return `${h}:${m}:${s}.${ms}`;
        }
        
        // Функция добавления лога
        function addLog(type, args) {
            const timestamp = new Date();
            const message = args.map(arg => {
                if (typeof arg === 'object') {
                    try {
                        return JSON.stringify(arg, null, 2);
                    } catch (e) {
                        return String(arg);
                    }
                }
                return String(arg);
            }).join(' ');
            
            window.appLogs.push({
                type: type,
                time: formatTime(timestamp),
                timestamp: timestamp.toISOString(),
                message: message
            });
            
            // Ограничиваем размер массива (последние 1000 логов)
            if (window.appLogs.length > 1000) {
                window.appLogs = window.appLogs.slice(-1000);
            }
        }
        
        // Перехватываем console.log
        const originalLog = console.log;
        console.log = function(...args) {
            addLog('LOG', args);
            originalLog.apply(console, args);
        };
        
        // Перехватываем console.error
        const originalError = console.error;
        console.error = function(...args) {
            addLog('ERROR', args);
            originalError.apply(console, args);
        };
        
        // Перехватываем console.warn
        const originalWarn = console.warn;
        console.warn = function(...args) {
            addLog('WARN', args);
            originalWarn.apply(console, args);
        };
        
        // Перехватываем console.info
        const originalInfo = console.info;
        console.info = function(...args) {
            addLog('INFO', args);
            originalInfo.apply(console, args);
        };
        
        // Перехват необработанных ошибок
        window.addEventListener('error', (event) => {
            addLog('ERROR', [
                'Необработанная ошибка:',
                event.error?.message || event.message,
                event.error?.stack || ''
            ]);
        });
        
        // 🔧 HOTFIX: Улучшенный перехват необработанных Promise rejection
        window.addEventListener('unhandledrejection', (event) => {
            // Логируем для отладки
            addLog('ERROR', [
                '🚨 Необработанный Promise rejection:',
                event.reason
            ]);

            console.error('🚨 Unhandled Promise rejection:', event.reason);

            // Предотвращаем дефолтное поведение браузера
            event.preventDefault();

            // Показываем fallback сообщение пользователю (если ошибка критичная)
            // НО только если нет уже открытого popup
            if (window.State && !window.State.isPopupOpen && window.Telegram?.WebApp) {
                // Проверяем что это не AbortError (отмена запроса - это нормально)
                const isAbortError = event.reason?.name === 'AbortError' ||
                                     event.reason?.message === 'App is inactive';

                if (!isAbortError) {
                    console.warn('⚠️ Показываем fallback popup для unhandled rejection');

                    try {
                        window.Telegram.WebApp.showAlert(
                            'Произошла непредвиденная ошибка. Попробуйте перезагрузить приложение.'
                        );
                    } catch (e) {
                        console.error('❌ Не удалось показать fallback alert:', e);
                    }
                }
            }
        });
        
        // 📥 ФУНКЦИЯ СКАЧИВАНИЯ ЛОГОВ
        window.downloadLogs = function() {
            if (window.appLogs.length === 0) {
                alert('Логов пока нет');
                return;
            }
            
            // Формируем текст логов
            const header = `=== ЛОГИ ПРИЛОЖЕНИЯ ===
Дата: ${new Date().toLocaleString('ru-RU')}
Telegram User ID: ${window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'unknown'}
User Agent: ${navigator.userAgent}
Всего логов: ${window.appLogs.length}

`;
            
            const logsText = header + window.appLogs.map(log => {
                const prefix = `[${log.time}] ${log.type.padEnd(5)}`;
                return `${prefix} | ${log.message}`;
            }).join('\n');
            
            // Создаём Blob и скачиваем
            const blob = new Blob([logsText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `app-logs-${Date.now()}.txt`;
            
            // Для iOS нужен trick
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            URL.revokeObjectURL(url);
            
            // Визуальная обратная связь
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✅ Скачано!';
            btn.classList.add('success');
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('success');
            }, 2000);
            
            console.log('✅ Логи скачаны! Всего записей:', window.appLogs.length);
        };
        
        // 📋 ФУНКЦИЯ КОПИРОВАНИЯ ЛОГОВ
        window.copyLogs = function() {
            if (window.appLogs.length === 0) {
                alert('Логов пока нет');
                return;
            }
            
            const header = `=== ЛОГИ ПРИЛОЖЕНИЯ ===
Дата: ${new Date().toLocaleString('ru-RU')}
Telegram User ID: ${window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'unknown'}
Всего логов: ${window.appLogs.length}

`;
            
            const logsText = header + window.appLogs.map(log => {
                return `[${log.time}] ${log.type} | ${log.message}`;
            }).join('\n');
            
            // Копируем в буфер
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(logsText).then(() => {
                    // Визуальная обратная связь
                    const btn = event.target;
                    const originalText = btn.textContent;
                    btn.textContent = '✅ Скопировано!';
                    btn.classList.add('success');
                    
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.classList.remove('success');
                    }, 2000);
                    
                    console.log('✅ Логи скопированы в буфер! Всего записей:', window.appLogs.length);
                }).catch(err => {
                    alert('Ошибка копирования: ' + err.message);
                });
            } else {
                // Fallback для старых браузеров
                const textarea = document.createElement('textarea');
                textarea.value = logsText;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    alert('Логи скопированы!');
                } catch (err) {
                    alert('Не удалось скопировать');
                }
                
                document.body.removeChild(textarea);
            }
        };
        
        // 🗑️ ФУНКЦИЯ ОЧИСТКИ ЛОГОВ
        window.clearLogs = function() {
            const count = window.appLogs.length;
            window.appLogs = [];
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = `✅ Очищено (${count})`;
            btn.classList.add('success');
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('success');
            }, 2000);
            
            console.log(`🗑️ Логи очищены! Удалено записей: ${count}`);
        };
        
        console.log('📝 Система логирования активирована');
        console.log('💾 Для скачивания логов нажмите кнопку "📥 Скачать логи" в углу');
        console.log('📋 Для копирования нажмите кнопку "📋 Копировать"');
    </script>

</body>
